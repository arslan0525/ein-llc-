<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | The LLC Factory</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-container {
            max-width: 650px;
            margin: 6rem auto;
            padding: 3.5rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 24px;
        }
        .form-group {
            margin-bottom: 2rem;
        }
        label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: #f1f5f9;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 1.1rem;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: var(--transition);
        }
        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(30, 41, 59, 1);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }
        option {
            background-color: #1e293b;
            color: white;
            padding: 15px;
        }
        input::placeholder {
            color: #64748b;
        }

        /* Mobile Fixes */
        @media (max-width: 768px) {
            .form-container {
                margin: 1.5rem auto;
                padding: 1.8rem 1.2rem;
                border-radius: 16px;
            }
            .form-container h2 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav id="navbar" style="position: static; background: rgba(2, 6, 23, 0.5); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border);">
        <div class="container nav-container" style="background: transparent; border-bottom: none; margin-top: 0; padding: 1.5rem 2rem;">
            <a href="index.html" class="logo">THE LLC <span>FACTORY</span></a>
            <a href="index.html" class="btn btn-outline" style="padding: 0.6rem 1.2rem; font-size: 0.85rem; border-color: rgba(255,255,255,0.2); display: flex; align-items: center; gap: 0.5rem; border-radius: 50px;">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="glass form-container">
            <h2 style="margin-bottom: 1rem; font-size: 2rem;">Start Your Application</h2>
            <p style="color: #94a3b8; margin-bottom: 0.5rem;">Fill out the details below and we'll redirect you to our expert on WhatsApp.</p>
            <p style="color: #64748b; font-size: 0.85rem; margin-bottom: 2rem;">📧 <a href="mailto:thellcfactory@gmail.com" style="color: var(--accent); text-decoration: none;">thellcfactory@gmail.com</a></p>
            
            <form id="onboardingForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="country">Country</label>
                    <input type="text" id="country" required placeholder="United Arab Emirates">
                </div>
                
                <div class="form-group">
                    <label for="service">Select Service</label>
                    <select id="service" required>
                        <option value="" disabled selected>Choose a service</option>
                        <option value="USA LLC">USA LLC Formation</option>
                        <option value="EIN">EIN Number Only</option>
                        <option value="ITIN">ITIN Processing</option>
                        <option value="UK LTD">UK LTD Registration</option>
                        <option value="Business Address">Business Address</option>
                        <option value="Bank Setup">Bank Setup</option>
                    </select>
                </div>
                
                <div id="stateGroup" class="form-group" style="display: none;">
                    <label for="state">Select State</label>
                    <select id="state">
                        <option value="Wyoming">Wyoming (Recommended)</option>
                        <option value="Delaware">Delaware</option>
                        <option value="New Mexico">New Mexico</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="timeline">Timeline</label>
                    <select id="timeline" required>
                        <option value="Normal">Normal (standard processing)</option>
                        <option value="Urgent">Urgent (expedited)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="whatsapp">WhatsApp Number</label>
                    <input type="tel" id="whatsapp" required placeholder="+1 234 567 8900">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
                    <button type="button" id="btnWhatsapp" class="btn btn-primary btn-glow" style="width: 100%; padding: 1rem; font-size: 0.95rem; background: #25d366; box-shadow: 0 4px 14px 0 rgba(37, 211, 102, 0.4); display:flex; align-items:center; justify-content:center; gap:0.5rem; white-space: nowrap;">
                        Submit & Chat on WhatsApp <i class="fab fa-whatsapp"></i>
                    </button>
                    <button type="button" id="btnEmail" class="btn btn-primary btn-glow" style="width: 100%; padding: 1rem; font-size: 0.95rem; background: #ea4335; box-shadow: 0 4px 14px 0 rgba(234, 67, 53, 0.4); display:flex; align-items:center; justify-content:center; gap:0.5rem; white-space: nowrap;">
                        Submit via Email (Gmail) <i class="fas fa-envelope"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const serviceSelect = document.getElementById('service');
        const stateGroup = document.getElementById('stateGroup');
        const form = document.getElementById('onboardingForm');

        serviceSelect.addEventListener('change', (e) => {
            if (e.target.value === 'USA LLC') {
                stateGroup.style.display = 'block';
            } else {
                stateGroup.style.display = 'none';
            }
        });

        // Pre-fill from URL parameter
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const serviceParam = urlParams.get('service');
            if (serviceParam) {
                const options = Array.from(serviceSelect.options);
                const match = options.find(opt => opt.value === serviceParam);
                if (match) {
                    serviceSelect.value = serviceParam;
                    serviceSelect.dispatchEvent(new Event('change'));
                    
                    const stateParam = urlParams.get('state');
                    if (stateParam && serviceParam === 'USA LLC') {
                        const stateSelect = document.getElementById('state');
                        const stateOptions = Array.from(stateSelect.options);
                        const stateMatch = stateOptions.find(opt => opt.value === stateParam);
                        if (stateMatch) {
                            stateSelect.value = stateParam;
                        }
                    }
                }
            }
        });

        function getFormData() {
            const name = document.getElementById('fullName').value.trim();
            const country = document.getElementById('country').value.trim();
            const service = serviceSelect.value;
            const timeline = document.getElementById('timeline').value;
            const whatsappNum = document.getElementById('whatsapp').value.trim();
            let state = '';
            if (service === 'USA LLC') {
                state = document.getElementById('state').value;
            }
            return {name, country, service, timeline, whatsappNum, state};
        }

        function validateForm() {
            if (!form.reportValidity()) return false;
            if (!serviceSelect.value) {
                alert('Please select a service.');
                return false;
            }
            return true;
        }

        document.getElementById('btnWhatsapp').addEventListener('click', () => {
            if (!validateForm()) return;
            const data = getFormData();
            
            let message = `Hello The LLC Factory!%0A%0AI would like to start my application:%0A%0A`;
            message += `*Full Name:* ${data.name}%0A`;
            message += `*Country:* ${data.country}%0A`;
            message += `*Service:* ${data.service}%0A`;
            if (data.service === 'USA LLC') {
                message += `*State:* ${data.state}%0A`;
            }
            message += `*Timeline:* ${data.timeline}%0A`;
            message += `*WhatsApp:* ${data.whatsappNum}%0A%0A`;
            
            const whatsappUrl = `https://wa.me/923360719256?text=${message}`;
            window.open(whatsappUrl, '_blank');
        });

        document.getElementById('btnEmail').addEventListener('click', () => {
            if (!validateForm()) return;
            const data = getFormData();
            
            const subject = encodeURIComponent(`New Application: ${data.service} - ${data.name}`);
            let body = `Hello The LLC Factory,\n\nI would like to start my application:\n\n`;
            body += `Full Name: ${data.name}\n`;
            body += `Country: ${data.country}\n`;
            body += `Service: ${data.service}\n`;
            if (data.service === 'USA LLC') {
                body += `State: ${data.state}\n`;
            }
            body += `Timeline: ${data.timeline}\n`;
            body += `WhatsApp Number: ${data.whatsappNum}\n`;
            
            const emailUrl = `mailto:thellcfactory@gmail.com?subject=${subject}&body=${encodeURIComponent(body)}`;
            window.location.href = emailUrl;
        });
    </script>
</body>
</html>
